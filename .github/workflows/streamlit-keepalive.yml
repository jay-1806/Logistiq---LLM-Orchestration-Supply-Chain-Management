name: Streamlit Keep Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

concurrency:
  group: streamlit-keepalive
  cancel-in-progress: false

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Validate URL secret
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "${STREAMLIT_APP_URL}" ]; then
            echo "Missing required secret: STREAMLIT_APP_URL"
            exit 1
          fi

      - name: Ping Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          set -euo pipefail

          URL="${STREAMLIT_APP_URL}"
          if [[ "${URL}" == *"?"* ]]; then
            URL="${URL}&_keepalive_ts=$(date +%s)"
          else
            URL="${URL}?_keepalive_ts=$(date +%s)"
          fi

          echo "Pinging ${URL}"
          curl --fail --silent --show-error \
            --location \
            --max-time 90 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --user-agent "github-actions-streamlit-keepalive" \
            "${URL}" >/dev/null

          echo "Keep-alive ping succeeded."
