name: Streamlit Keep Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

concurrency:
  group: streamlit-keepalive
  cancel-in-progress: false

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Validate URL secret
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          URL="$(echo "${STREAMLIT_APP_URL}" | tr -d '\r' | xargs)"
          if [ -z "${URL}" ]; then
            echo "Missing required secret: STREAMLIT_APP_URL"
            exit 1
          fi

          if [[ ! "${URL}" =~ ^https?:// ]]; then
            echo "STREAMLIT_APP_URL must start with http:// or https://"
            exit 1
          fi

      - name: Ping Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          set -euo pipefail

          URL="$(echo "${STREAMLIT_APP_URL}" | tr -d '\r' | xargs)"
          BASE_URL="${URL%/}"
          TS="$(date +%s)"

          HEALTH_URL="${BASE_URL}/_stcore/health?_keepalive_ts=${TS}"
          echo "Pinging health endpoint: ${HEALTH_URL}"

          status_from_url () {
            local target="$1"
            curl --silent --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 90 \
              --retry 3 \
              --retry-delay 5 \
              --retry-all-errors \
              --user-agent "github-actions-streamlit-keepalive" \
              "${target}"
          }

          is_success_status () {
            local code="$1"
            case "${code}" in
              2*|3*|403|404)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          HEALTH_STATUS="$(status_from_url "${HEALTH_URL}")"
          echo "Health endpoint returned HTTP ${HEALTH_STATUS}"
          if is_success_status "${HEALTH_STATUS}"; then
            echo "Keep-alive ping succeeded via health endpoint."
            exit 0
          fi

          if [[ "${URL}" == *"?"* ]]; then
            PAGE_URL="${URL}&_keepalive_ts=${TS}"
          else
            PAGE_URL="${URL}?_keepalive_ts=${TS}"
          fi

          echo "Health endpoint failed; falling back to app page: ${PAGE_URL}"

          PAGE_STATUS="$(status_from_url "${PAGE_URL}")"
          echo "App page returned HTTP ${PAGE_STATUS}"
          if is_success_status "${PAGE_STATUS}"; then
            echo "Keep-alive ping succeeded via app page fallback."
            exit 0
          fi

          echo "Keep-alive ping failed (health=${HEALTH_STATUS}, page=${PAGE_STATUS})."
          exit 1
